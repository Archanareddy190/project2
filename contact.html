<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#65b792,#ff99ac,#fad0c4);
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:20px;
    text-align:center;
    color:white;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

header h1{
    font-size:28px;
    letter-spacing:1px;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 12px;
    font-weight:500;
    position:relative;
    transition:0.3s;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:white;
    transition:0.3s;
}

nav a:hover::after{
    width:100%;
}

/* MAIN SECTION */
section{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.contact-container{
    width:900px;
    max-width:95%;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.contact-info{
    flex:1;
    padding:40px;
    color:white;
    background: linear-gradient(135deg,#a5ece2,#ff758c);
}

.contact-info h2{
    margin-bottom:20px;
    font-size:24px;
}

.contact-info p{
    margin-bottom:15px;
    font-size:15px;
}

/* RIGHT SIDE FORM */
.contact-form{
    flex:1;
    padding:40px;
    background:white;
}

.contact-form h2{
    color:#c27ece;
    margin-bottom:20px;
}

label{
    font-weight:600;
    font-size:14px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
    transition:0.3s;
}

input:focus, textarea:focus{
    border-color:#ff4f81;
    box-shadow:0 0 10px rgba(255,79,129,0.3);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background: linear-gradient(to right,#ff4f81,#ff758c);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(255,79,129,0.4);
}
</style>

</head>

<body>

<header>
<h1>Contact Us</h1>
<nav>
<a href="home.html">Home</a>
<a href="types.html">Types</a>
<a href="interest.html">Learn / Visit</a>
<a href="implementation.html">How Designs are Made</a>
<a href="creations.html">Our Creations</a>
</nav>
</header>

<section>
<div class="contact-container">

<div class="contact-info">
<h2>Our Contact Details</h2>
<p><strong>Phone:</strong> +91 9876543210</p>
<p><strong>Alternate Phone:</strong> +91 9123456780</p>
<p><strong>Email:</strong> your-email@example.com</p>
<p>We would love to hear from you! Send us your queries and feedback anytime.</p>
</div>

<div class="contact-form">
<h2>Send Us a Message</h2>
<form action="mailto:your-email@example.com" method="post" enctype="text/plain">

<label>Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Message</label>
<textarea rows="5"></textarea>

<button type="submit">Send Message</button>

</form>
</div>

</div>
</section>

</body>
</html>
